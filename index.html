<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Motor Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0c10; --panel: #111418; --border: #1e2530;
      --on: #00e5a0; --on-glow: rgba(0,229,160,0.35);
      --off: #ff3b5c; --off-glow: rgba(255,59,92,0.35);
      --idle: #2a3040; --text: #c8d4e0; --muted: #4a5568;
      --mono: 'Share Tech Mono', monospace; --sans: 'Rajdhani', sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; }
    body::after { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px); pointer-events: none; z-index: 10; }
    .container { position: relative; width: 340px; z-index: 5; }
    .header { text-align: center; margin-bottom: 32px; }
    .header .label { font-family: var(--mono); font-size: 11px; letter-spacing: 4px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
    .header h1 { font-size: 28px; font-weight: 700; letter-spacing: 6px; text-transform: uppercase; color: var(--text); }
    .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 32px; position: relative; }
    .panel::before, .panel::after { content: ''; position: absolute; width: 12px; height: 12px; border-color: var(--on); border-style: solid; }
    .panel::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .panel::after { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
    .status-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; padding: 10px 14px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 2px; }
    .status-label { font-family: var(--mono); font-size: 10px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; }
    .status-right { display: flex; align-items: center; gap: 10px; }
    .status-value { font-family: var(--mono); font-size: 13px; letter-spacing: 2px; font-weight: bold; transition: color 0.3s, text-shadow 0.3s; }
    .status-value.on { color: var(--on); text-shadow: 0 0 12px var(--on); }
    .status-value.off { color: var(--off); text-shadow: 0 0 12px var(--off); }
    .status-value.idle { color: var(--muted); text-shadow: none; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: background 0.3s, box-shadow 0.3s; }
    .dot.on { background: var(--on); box-shadow: 0 0 8px var(--on), 0 0 20px var(--on-glow); }
    .dot.off { background: var(--off); box-shadow: 0 0 8px var(--off), 0 0 20px var(--off-glow); }
    .btn-wrap { display: flex; justify-content: center; margin-bottom: 28px; }
    .power-btn { position: relative; width: 140px; height: 140px; border-radius: 50%; border: none; background: transparent; cursor: pointer; outline: none; -webkit-tap-highlight-color: transparent; }
    .power-btn .ring { position: absolute; inset: 0; border-radius: 50%; border: 2px solid var(--idle); transition: border-color 0.4s, box-shadow 0.4s; }
    .power-btn .ring2 { position: absolute; inset: 10px; border-radius: 50%; border: 1px solid var(--border); transition: border-color 0.4s; }
    .power-btn .core { position: absolute; inset: 18px; border-radius: 50%; background: #0d1017; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; transition: background 0.4s, border-color 0.4s, box-shadow 0.4s; }
    .power-btn .icon { width: 44px; height: 44px; }
    .power-btn .icon path { stroke: var(--muted); transition: stroke 0.4s; }
    .power-btn.on .ring { border-color: var(--on); box-shadow: 0 0 20px var(--on-glow), inset 0 0 20px rgba(0,229,160,0.05); }
    .power-btn.on .ring2 { border-color: rgba(0,229,160,0.3); }
    .power-btn.on .core { background: rgba(0,229,160,0.07); border-color: rgba(0,229,160,0.4); box-shadow: inset 0 0 30px rgba(0,229,160,0.1); }
    .power-btn.on .icon path { stroke: var(--on); filter: drop-shadow(0 0 6px var(--on)); }
    .power-btn.off .ring { border-color: var(--off); box-shadow: 0 0 20px var(--off-glow), inset 0 0 20px rgba(255,59,92,0.05); }
    .power-btn.off .ring2 { border-color: rgba(255,59,92,0.3); }
    .power-btn.off .core { background: rgba(255,59,92,0.07); border-color: rgba(255,59,92,0.4); box-shadow: inset 0 0 30px rgba(255,59,92,0.1); }
    .power-btn.off .icon path { stroke: var(--off); }
    @keyframes pulse-ring { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.15); opacity: 0; } }
    .power-btn.on .ring::before { content: ''; position: absolute; inset: -6px; border-radius: 50%; border: 1px solid var(--on); animation: pulse-ring 1.8s ease-out infinite; }
    .power-btn:active .core { transform: scale(0.95); }
    .log { border-top: 1px solid var(--border); padding-top: 16px; }
    .log-title { font-family: var(--mono); font-size: 9px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
    .log-entries { list-style: none; display: flex; flex-direction: column; gap: 5px; }
    .log-entry { font-family: var(--mono); font-size: 11px; color: var(--muted); display: flex; gap: 10px; opacity: 0; animation: fadein 0.3s forwards; }
    @keyframes fadein { to { opacity: 1; } }
    .log-entry .ts { color: #2a3a4a; }
    .log-entry.success .msg { color: var(--on); }
    .log-entry.error .msg { color: var(--off); }
    .log-entry.pending .msg { color: #f0a500; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .power-btn.loading .core::after { content: ''; position: absolute; width: 20px; height: 20px; border: 2px solid transparent; border-top-color: var(--on); border-radius: 50%; animation: spin 0.7s linear infinite; }
    .power-btn.loading .icon { opacity: 0.2; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="label">Remote Control Unit</div>
    <h1>vswitch1</h1>
  </div>
  <div class="panel">
    <div class="status-row">
      <span class="status-label">Motor Status</span>
      <div class="status-right">
        <span class="status-value idle" id="statusText">STANDBY</span>
        <div class="dot" id="statusDot"></div>
      </div>
    </div>
    <div class="btn-wrap">
      <button class="power-btn" id="powerBtn">
        <div class="ring"></div>
        <div class="ring2"></div>
        <div class="core">
          <svg class="icon" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22 8V22" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M14 12.5A14 14 0 1 0 30 12.5" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          </svg>
        </div>
      </button>
    </div>
    <div class="log">
      <div class="log-title">// Activity Log</div>
      <ul class="log-entries" id="logEntries">
        <li class="log-entry">
          <span class="ts">--:--:--</span>
          <span class="msg">Waiting for command...</span>
        </li>
      </ul>
    </div>
  </div>
</div>
<script>
  var WORKER_URL = 'https://vswitch1worker1.glxy8b.workers.dev';
  var motorOn = false;
  var isLoading = false;

  document.getElementById('powerBtn').addEventListener('click', toggleMotor);

  async function toggleMotor() {
    if (isLoading) return;
    var nextState = !motorOn;
    var state = nextState ? 'On' : 'Off';
    setLoading(true);
    addLog('Sending command: ' + state.toUpperCase() + '...', 'pending');
    try {
      var res = await fetch(WORKER_URL + '?state=' + state);
      var data = await res.json();
      if (data.success) {
        motorOn = nextState;
        setMotorState(motorOn);
        addLog('Motor turned ' + state.toUpperCase() + '.', 'success');
      } else {
        addLog('Error: ' + (data.message || 'Request failed'), 'error');
      }
    } catch (e) {
      addLog('Network error: ' + e.message, 'error');
    } finally {
      setLoading(false);
    }
  }

  function setMotorState(on) {
    var btn = document.getElementById('powerBtn');
    var dot = document.getElementById('statusDot');
    var text = document.getElementById('statusText');
    btn.className = 'power-btn ' + (on ? 'on' : 'off');
    dot.className = 'dot ' + (on ? 'on' : 'off');
    text.className = 'status-value ' + (on ? 'on' : 'off');
    text.textContent = on ? 'RUNNING' : 'STOPPED';
  }

  function setLoading(val) {
    isLoading = val;
    var btn = document.getElementById('powerBtn');
    if (val) { btn.classList.add('loading'); } else { btn.classList.remove('loading'); }
  }

  function addLog(msg, type) {
    type = type || '';
    var list = document.getElementById('logEntries');
    var ts = new Date().toTimeString().slice(0, 8);
    var li = document.createElement('li');
    li.className = 'log-entry ' + type;
    var tsSpan = document.createElement('span');
    tsSpan.className = 'ts';
    tsSpan.textContent = ts;
    var msgSpan = document.createElement('span');
    msgSpan.className = 'msg';
    msgSpan.textContent = msg;
    li.appendChild(tsSpan);
    li.appendChild(msgSpan);
    list.insertBefore(li, list.firstChild);
    while (list.children.length > 5) { list.removeChild(list.lastChild); }
  }
</script>
</body>
</html>
