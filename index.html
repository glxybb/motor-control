<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src https://vswitch1worker1.glxy8b.workers.dev;">
  <title>Motor Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="label">Remote Control Unit</div>
    <h1>vswitch1</h1>
  </div>

  <div class="panel">

    <div class="status-row">
      <span class="status-label">Motor Status</span>
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="status-value idle" id="statusText">STANDBY</span>
        <div class="dot" id="statusDot"></div>
      </div>
    </div>

    <div class="btn-wrap">
      <button class="power-btn" id="powerBtn">
        <div class="ring"></div>
        <div class="ring2"></div>
        <div class="core">
          <svg class="icon" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22 8V22" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M14 12.5A14 14 0 1 0 30 12.5" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          </svg>
        </div>
      </button>
    </div>

    <div class="log">
      <div class="log-title">// Activity Log</div>
      <ul class="log-entries" id="logEntries">
        <li class="log-entry">
          <span class="ts">--:--:--</span>
          <span class="msg">Waiting for command...</span>
        </li>
      </ul>
    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
