<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Device Control</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.08);
      --border-md: rgba(0,0,0,0.14);
      --text: #1a1a1a;
      --muted: #888;
      --faint: #bbb;
      --green-fill: #eaf3de;
      --green-border: #97c459;
      --green-text: #3b6d11;
      --green-dot: #639922;
      --amber-fill: #faeeda;
      --amber-border: #ef9f27;
      --amber-text: #854f0b;
      --amber-dot: #ba7517;
      --red-fill: #fcebeb;
      --red-border: #f09595;
      --red-text: #a32d2d;
      --red-dot: #e24b4a;
      --sans: 'DM Sans', sans-serif;
      --mono: 'DM Mono', monospace;
      --radius: 16px;
      --radius-sm: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .container { width: 100%; max-width: 520px; }

    .page-header { margin-bottom: 28px; }
    .page-header p { font-size: 12px; font-weight: 400; color: var(--muted); letter-spacing: 0.4px; margin-bottom: 4px; }
    .page-header h1 { font-size: 24px; font-weight: 500; color: var(--text); letter-spacing: -0.3px; }

    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 16px;
    }

    .card {
      background: var(--surface);
      border: 0.5px solid var(--border-md);
      border-radius: var(--radius);
      padding: 24px 20px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .card-label {
      font-size: 12px;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.3px;
      align-self: flex-start;
    }

    .big-btn {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      border: 0.5px solid var(--border-md);
      background: var(--bg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s, transform 0.12s;
      flex-shrink: 0;
    }
    .big-btn:hover { border-color: rgba(0,0,0,0.22); }
    .big-btn:active { transform: scale(0.95); }

    .big-btn svg { width: 28px; height: 28px; stroke: var(--muted); transition: stroke 0.2s; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }

    .big-btn.on-green { background: var(--green-fill); border-color: var(--green-border); }
    .big-btn.on-green svg { stroke: var(--green-text); }
    .big-btn.off { background: var(--red-fill); border-color: var(--red-border); }
    .big-btn.off svg { stroke: var(--red-text); }
    .big-btn.on-amber { background: var(--amber-fill); border-color: var(--amber-border); }
    .big-btn.on-amber svg { stroke: var(--amber-text); }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 400;
      padding: 5px 12px;
      border-radius: 99px;
      border: 0.5px solid var(--border-md);
      color: var(--muted);
      background: var(--bg);
      transition: all 0.2s;
    }
    .status-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--faint); transition: background 0.2s; flex-shrink: 0; }

    .status-badge.on-green { background: var(--green-fill); border-color: var(--green-border); color: var(--green-text); }
    .status-badge.on-green .dot { background: var(--green-dot); }
    .status-badge.on-amber { background: var(--amber-fill); border-color: var(--amber-border); color: var(--amber-text); }
    .status-badge.on-amber .dot { background: var(--amber-dot); }
    .status-badge.off { background: var(--red-fill); border-color: var(--red-border); color: var(--red-text); }
    .status-badge.off .dot { background: var(--red-dot); }

    .log {
      width: 100%;
      background: var(--bg);
      border-radius: var(--radius-sm);
      border: 0.5px solid var(--border);
      padding: 10px 12px;
      max-height: 90px;
      overflow-y: auto;
    }
    .log::-webkit-scrollbar { width: 3px; }
    .log::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 3px; }

    .log-entry {
      font-size: 11px;
      font-family: var(--mono);
      font-weight: 300;
      color: var(--muted);
      padding: 2px 0;
      display: flex;
      gap: 8px;
      border-bottom: 0.5px solid var(--border);
    }
    .log-entry:last-child { border-bottom: none; }
    .log-entry .ts { color: var(--faint); flex-shrink: 0; }
    .log-entry.ok .msg   { color: var(--green-text); }
    .log-entry.amber .msg { color: var(--amber-text); }
    .log-entry.err .msg  { color: var(--red-text); }
    .log-entry.info .msg { color: var(--faint); }

    .footer {
      text-align: center;
      font-size: 11px;
      font-family: var(--mono);
      font-weight: 300;
      color: var(--faint);
      letter-spacing: 0.5px;
    }

    @media (max-width: 400px) {
      .cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="page-header">
    <p>Control panel</p>
    <h1>My devices</h1>
  </div>

  <div class="cards">

    <!-- MOTOR -->
    <div class="card">
      <span class="card-label">Motor</span>
      <button class="big-btn" id="motorBtn" aria-label="Toggle motor">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2v10"/>
          <path d="M7.5 5.5A9 9 0 1 0 16.5 5.5"/>
        </svg>
      </button>
      <span class="status-badge" id="motorBadge">
        <span class="dot"></span>
        <span id="motorStatusText">Standby</span>
      </span>
      <div class="log" id="motorLog">
        <div class="log-entry info"><span class="ts">--:--:--</span><span class="msg">Waiting…</span></div>
      </div>
    </div>

    <!-- LED -->
    <div class="card">
      <span class="card-label">LED light</span>
      <button class="big-btn" id="ledBtn" aria-label="Toggle LED">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2a7 7 0 0 1 4 12.74V17H8v-2.26A7 7 0 0 1 12 2z"/>
          <path d="M9 17h6M10 20h4"/>
        </svg>
      </button>
      <span class="status-badge" id="ledBadge">
        <span class="dot"></span>
        <span id="ledStatusText">Standby</span>
      </span>
      <div class="log" id="ledLog">
        <div class="log-entry info"><span class="ts">--:--:--</span><span class="msg">Waiting…</span></div>
      </div>
    </div>

  </div>

  <div class="footer">ESP32 · SinricPro · Cloudflare</div>

</div>
<script>
  var MOTOR_WORKER_URL = 'https://vswitch1worker1.glxy8b.workers.dev';
  var LED_WORKER_URL   = 'https://led-worker.glxy8b.workers.dev';

  var motorOn = false;
  var ledOn   = false;

  function ts() { return new Date().toTimeString().slice(0, 8); }

  function addLog(logEl, message, type) {
    var d = document.createElement('div');
    d.className = 'log-entry ' + type;
    d.innerHTML = '<span class="ts">' + ts() + '</span><span class="msg">' + message + '</span>';
    logEl.insertBefore(d, logEl.firstChild);
    while (logEl.children.length > 20) logEl.removeChild(logEl.lastChild);
  }

  function setMotor(on) {
    motorOn = on;
    document.getElementById('motorBtn').className        = 'big-btn ' + (on ? 'on-green' : 'off');
    document.getElementById('motorBadge').className      = 'status-badge ' + (on ? 'on-green' : 'off');
    document.getElementById('motorStatusText').textContent = on ? 'Running' : 'Stopped';
  }

  function setLed(on) {
    ledOn = on;
    document.getElementById('ledBtn').className        = 'big-btn ' + (on ? 'on-amber' : 'off');
    document.getElementById('ledBadge').className      = 'status-badge ' + (on ? 'on-amber' : 'off');
    document.getElementById('ledStatusText').textContent = on ? 'On' : 'Off';
  }

  async function toggleMotor() {
    var next  = !motorOn;
    var state = next ? 'On' : 'Off';
    var log   = document.getElementById('motorLog');
    addLog(log, 'Sending ' + state + '…', 'info');
    try {
      var res  = await fetch(MOTOR_WORKER_URL + '?state=' + state);
      var data = await res.json();
      if (res.ok) { setMotor(next); addLog(log, 'Motor ' + state.toLowerCase() + ' — OK', 'ok'); }
      else addLog(log, 'Error: ' + (data.error || res.status), 'err');
    } catch (e) { addLog(log, 'Network error', 'err'); }
  }

  async function toggleLed() {
    var next  = !ledOn;
    var state = next ? 'on' : 'off';
    var log   = document.getElementById('ledLog');
    addLog(log, 'Sending LED ' + state + '…', 'info');
    try {
      var res  = await fetch(LED_WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ state: state })
      });
      var data = await res.json();
      if (res.ok) { setLed(next); addLog(log, 'LED ' + state + ' — OK', 'amber'); }
      else addLog(log, 'Error: ' + (data.error || res.status), 'err');
    } catch (e) { addLog(log, 'Network error', 'err'); }
  }

  document.getElementById('motorBtn').addEventListener('click', toggleMotor);
  document.getElementById('ledBtn').addEventListener('click', toggleLed);
</script>
</body>
</html>
